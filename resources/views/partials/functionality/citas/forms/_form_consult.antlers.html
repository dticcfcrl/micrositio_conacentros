<div class="container">
    <form action="{{ current_uri }}" id="form_consult" method="post">
        <input type="hidden" name="_token" value="{{ csrf_token }}" />
        <div class="col-lg-12 col-md-12 col-sm-12">
            <label for="cclNombre" class="d-block dorada my-2">
                <h4 class="dorada"> Proporcione folio: </h4>
            </label>
            <div class="input-group has-validation">
                <input type="text" class="form-control mb-3" name="folio" id="_consultarFolio"
                    placeholder="Vg4H33d7qA1241445">
                <input type="hidden" name="consulta" value="true">
                <div class="invalid-feedback">
                    Folio
                </div>
            </div>
            <div class="p-2 flex-grow-1 justify-content-end text-center">
                <button class="btn btn-primary btn-primary-ccls rounded-pill" data-bs-dismiss="modal"
                    onclick="mensajeProcesando()" type="submit">Consultar</button>
            </div>
        </div>
    </form>
</div>

<script>
    const limpiarPlaceholder = (e) => {
        e.target.placeholder = '';
    }

    const colocarPlaceholder = (placeholder, e) => {
      e.target.placeholder = placeholder;
    }

    const input_folio = document.getElementById('_consultarFolio');   

    /*Se limpia placeholder*/
    input_folio.addEventListener("click", (e) => limpiarPlaceholder(e));
    input_folio.addEventListener("focus", (e) => limpiarPlaceholder(e));
    input_folio.addEventListener("blur", (e) => colocarPlaceholder('Vg4H33d7qA1241445', e));
</script>
