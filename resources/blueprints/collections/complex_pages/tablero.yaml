title: Tablero
tabs:
  main:
    display: Principal
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: template
            field:
              hide_partials: true
              blueprint: false
              folder: complex_pages
              type: template
              display: Plantilla
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
