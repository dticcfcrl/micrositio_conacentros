title: 'Localiza Centro Mapa'
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: title_content
            field:
              input_type: text
              antlers: false
              type: text
              display: 'Título del mapa'
              instructions: 'Instrucciones para indicar al usuario seleccione el estado.'
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: template
            field:
              hide_partials: true
              blueprint: false
              type: template
              display: Template
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
              folder: complex_pages
          -
            handle: previous_page
            field:
              type: link
              display: 'Página anterior'
              instructions: 'Enlace para regresar a la página previa.'
              listable: hidden
              instructions_position: below
              visibility: visible
              replicator_preview: true
              hide_display: false
