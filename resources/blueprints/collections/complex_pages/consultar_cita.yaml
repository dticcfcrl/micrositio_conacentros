              instructions: 'Texto para indicar la fecha y hora de la cita.'
              listable: hidden
              instructions_position: below
              visibility: visible
              replicator_preview: true
              hide_display: false
          -
            handle: text_email
            field:
              input_type: text
              antlers: false
              type: text
              display: 'Texto de correo'
              instructions: 'Texto para indicar el correo registrado de la cita.'
              listable: hidden
              instructions_position: below
              visibility: visible
              replicator_preview: true
              hide_display: false
          -
            handle: text_observations
            field:
              input_type: text
              antlers: false
              type: text
              display: 'Texto observaciones'
              instructions: 'Texto de las observaciones o notas del usuario respecto de la cita.'
              listable: hidden
              instructions_position: below
              visibility: visible
              replicator_preview: true
              hide_display: false
          -
            handle: text_directions
            field:
              input_type: text
              antlers: false
              type: text
              display: 'Texto dirección de la oficina'
              instructions: 'Texto que indica la dirección de la oficina de la cita.'
              listable: hidden
              instructions_position: below
              visibility: visible
              replicator_preview: true
              hide_display: false
          -
            handle: text_map
