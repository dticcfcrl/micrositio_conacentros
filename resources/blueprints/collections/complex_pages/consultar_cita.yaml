              visibility: visible
              replicator_preview: true
              hide_display: false
          -
            handle: text_folio
            field:
              input_type: text
              antlers: false
              type: text
              display: 'Texto folio'
              instructions: 'Texto para indicar el folio de la cita.'
              listable: hidden
              instructions_position: below
              visibility: visible
              replicator_preview: true
              hide_display: false
          -
            handle: text_datetime
            field:
              input_type: text
              antlers: false
              type: text
