title: 'Consultar cita'
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: previous_page
            field:
              type: link
              display: 'Página de retorno'
              instructions: 'Página al dar clic al botón de regresar.'
              listable: hidden
              instructions_position: below
              visibility: visible
              replicator_preview: true
              hide_display: false
          -
            handle: title_appointment_registered
            field:
              input_type: text
              antlers: false
              type: text
              display: 'Título cita registrada'
              instructions: 'Título para indicar la consulta de una cita. Se muestra cuando se consulta el folio.'
              listable: hidden
              instructions_position: below
              visibility: visible
              replicator_preview: true
              hide_display: false
          -
            handle: title_appointment
            field:
              input_type: text
              antlers: false
              type: text
              display: 'Título cita agendada'
              instructions: 'Título para indicar que la cita se agendó exitosamente. Se muestra después de pasar el proceso de agendar cita.'
              listable: hidden
              instructions_position: below
              visibility: visible
              replicator_preview: true
              hide_display: false
          -
            handle: text_names
            field:
              input_type: text
              antlers: false
              type: text
              display: 'Texto nombres'
              instructions: 'Texto para indicar a qué nombre fue registrada la cita.'
              listable: hidden
