                                  display: 'Elemento para enlace'
                                  listable: hidden
                                  instructions_position: below
                                  visibility: visible
                                  replicator_preview: true
                                  hide_display: false
                    type: replicator
                    display: Enlaces
                    instructions: 'Enlaces que aparecerán en el menú del footer.'
                    listable: hidden
                    instructions_position: above
                    visibility: visible
                    replicator_preview: true
                    hide_display: false
              fullscreen: true
