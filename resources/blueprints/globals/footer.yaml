                    collapse: false
                    previews: true
                    fullscreen: true
                    sets:
                      elements:
                        display: Contenido
                        instructions: null
                        icon: arrow-roadmap-path-flow
                        sets:
                          link:
                            display: Enlace
                            instructions: 'Título y enlace a redireccionar.'
