title: 'Contenido dinámico general'
fields:
  -
    handle: content_field
    field:
      collapse: false
      previews: true
      fullscreen: true
      sets:
        group_content:
          display: Grupo
          instructions: null
          icon: dashboard-layout
          sets:
            title_subcontent:
              display: Título
              instructions: null
              icon: form-text-field
              fields:
                -
                  handle: subtitle
                  field:
                    input_type: text
                    antlers: false
                    type: text
                    display: Encabezado
                    instructions: 'Subtítulo para el contenido.'
                    listable: hidden
                    instructions_position: below
                    visibility: visible
                    replicator_preview: true
                    hide_display: false
            text_subcontent:
              display: Párrafo
              instructions: null
              icon: text-formatting-initial-letter
              fields:
                -
                  handle: textarea_subcontent
                  field:
                    buttons:
                      - bold
                      - italic
                      - unorderedlist
                      - orderedlist
                      - removeformat
                      - quote
                      - anchor
                      - image
                      - table
                      - underline
                      - small
                      - superscript
                      - subscript
                      - horizontalrule
                      - alignleft
                      - aligncenter
                      - alignright
                      - alignjustify
                    smart_typography: false
                    save_html: true
                    inline: false
                    toolbar_mode: fixed
                    reading_time: false
                    word_count: false
                    fullscreen: true
                    allow_source: true
                    enable_input_rules: true
                    enable_paste_rules: true
                    remove_empty_nodes: false
                    antlers: false
                    link_noopener: false
                    link_noreferrer: false
                    target_blank: false
                    always_show_set_button: false
                    collapse: false
                    previews: true
                    type: bard
                    display: Conenido
                    instructions: 'Párrafo para agregar al contenido de la página.'
                    listable: hidden
                    instructions_position: above
                    visibility: visible
                    replicator_preview: true
                    hide_display: false
            image_content:
              display: Imagen
              instructions: null
              icon: media-image-picture-orientation
              fields:
                -
                  handle: image
                  field:
                    max_files: 1
                    min_files: 1
                    mode: list
                    container: assets
                    restrict: false
                    allow_uploads: true
                    show_filename: true
                    show_set_alt: true
                    type: assets
                    display: 'Imagen a mostrar'
                    instructions: 'Imagen para agregar a la sección.'
                    listable: hidden
                    instructions_position: above
                    visibility: visible
                    replicator_preview: true
                    hide_display: false
      type: replicator
      display: Contenido
      instructions: 'Agrega el contenido para mostrar, se puede agregar: título, párrafos e imágenes.'
      listable: hidden
      instructions_position: above
      visibility: visible
      replicator_preview: true
      hide_display: false
